<!--
  Vanilla HTML form snippet — paste vào index.html của static landing page
  Generated by biz-email-setup
  POST tới /api/submit (Vercel serverless function)
-->

<form id="lead-form" class="lead-form" novalidate>
  <input type="text" name="name" placeholder="Họ và tên" required autocomplete="name" />
  <input type="tel" name="phone" placeholder="Số điện thoại" required autocomplete="tel" inputmode="tel" pattern="[0-9+\s().-]{9,15}" />
  <input type="email" name="email" placeholder="Email" required autocomplete="email" inputmode="email" />

  <button type="submit" id="lead-form-submit">{{CTA_BUTTON_TEXT}}</button>

  <p id="lead-form-msg" class="lead-form-msg" hidden></p>
  <p class="lead-form-note">Em cam kết không spam. Anh/chị có thể hủy đăng ký bất kỳ lúc nào.</p>
</form>

<style>
  .lead-form { display: flex; flex-direction: column; gap: 12px; max-width: 480px; }
  .lead-form input { padding: 12px 16px; font-size: 16px; border: 1px solid #d1d5db; border-radius: 8px; outline: none; }
  .lead-form input:focus { border-color: #000; box-shadow: 0 0 0 3px rgba(0,0,0,0.08); }
  .lead-form button { padding: 14px 16px; font-size: 16px; font-weight: 600; color: #fff; background: #000; border: 0; border-radius: 8px; cursor: pointer; transition: opacity 0.2s; }
  .lead-form button:hover { opacity: 0.85; }
  .lead-form button:disabled { opacity: 0.5; cursor: not-allowed; }
  .lead-form-msg { font-size: 14px; margin: 0; }
  .lead-form-msg.error { color: #dc2626; }
  .lead-form-msg.success { color: #059669; }
  .lead-form-note { font-size: 12px; color: #6b7280; margin: 0; }
</style>

<script>
(function () {
  const form = document.getElementById("lead-form");
  const btn = document.getElementById("lead-form-submit");
  const msg = document.getElementById("lead-form-msg");
  const originalBtnText = btn.textContent;

  function showMsg(text, type) {
    msg.textContent = text;
    msg.className = "lead-form-msg " + type;
    msg.hidden = false;
  }

  form.addEventListener("submit", async function (e) {
    e.preventDefault();
    btn.disabled = true;
    btn.textContent = "Đang gửi...";
    msg.hidden = true;

    const fd = new FormData(form);
    const params = new URLSearchParams(window.location.search);
    const payload = {
      name: (fd.get("name") || "").toString().trim(),
      phone: (fd.get("phone") || "").toString().trim(),
      email: (fd.get("email") || "").toString().trim(),
      utm_source: params.get("utm_source") || undefined,
      utm_campaign: params.get("utm_campaign") || undefined,
    };

    if (!payload.name || !payload.phone || !payload.email) {
      showMsg("⚠️ Anh/chị điền đủ giúp em họ tên, SĐT và email nhé.", "error");
      btn.disabled = false;
      btn.textContent = originalBtnText;
      return;
    }

    try {
      const res = await fetch("/api/submit", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      const data = await res.json();
      if (!res.ok || !data.ok) {
        showMsg("⚠️ " + (data.error || "Có lỗi gửi form. Anh/chị thử lại."), "error");
        btn.disabled = false;
        btn.textContent = originalBtnText;
        return;
      }
      form.style.display = "none";
      showMsg("✓ Đã nhận thông tin! Anh/chị check email (và spam folder) trong 1 phút tới. Cần hỗ trợ nhắn Zalo: {{ZALO_NUMBER}}.", "success");
    } catch (err) {
      showMsg("⚠️ Mạng có vẻ chậm. Anh/chị thử lại hoặc nhắn Zalo trực tiếp.", "error");
      btn.disabled = false;
      btn.textContent = originalBtnText;
    }
  });
})();
</script>
